name: ha_ecommerce
description: "HA E-Commerce - Premium Multi-Platform Flutter Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_performance: ^0.10.0+4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4

  # Network & Storage
  dio: ^5.6.0
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.0

  # UI Components
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.1.2
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  skeletonizer: ^1.4.2

  # DI
  injectable: ^2.4.4
  get_it: ^8.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.6.2
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
